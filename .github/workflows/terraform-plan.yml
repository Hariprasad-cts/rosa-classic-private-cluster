name: Terraform Plan
 
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
      mode:
        description: "Plan type"
        required: true
        type: choice
        options:
          - apply
          - destroy
 
env:
  TF_VERSION: 1.6.6
 
jobs:
  plan:
    name: "Terraform Plan [${{ github.event.inputs.environment }}] [${{ github.event.inputs.mode }}]"
    runs-on: ubuntu-latest
 
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
 
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
 
      - name: Verify environment
        run: |
          echo "Environment : ${{ github.event.inputs.environment }}"
          echo "Mode        : ${{ github.event.inputs.mode }}"
          echo "Var file    : ${{ github.event.inputs.environment }}.tfvars"
          echo "AWS_ACCESS_KEY_ID set? ${AWS_ACCESS_KEY_ID:+YES}"
 
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
 
      - name: Terraform Init
        run: terraform init -input=false
 
      - name: Terraform Validate
        run: terraform validate
 
      - name: Terraform Plan
        run: |
          VAR_FILE="${{ github.event.inputs.environment }}.tfvars"
          if [ "${{ github.event.inputs.mode }}" = "destroy" ]; then
            terraform plan -destroy -var-file="$VAR_FILE" -out=tfplan -input=false
          else
            terraform plan -var-file="$VAR_FILE" -out=tfplan -input=false
          fi
 
      # Artifact name uses environment only — no mode — avoids mismatch with Apply
      - name: Upload Plan Artifact for Review
        uses: actions/upload-artifact@v4
        with:
          name: "tfplan-${{ github.event.inputs.environment }}"
          path: tfplan
          retention-days: 30
