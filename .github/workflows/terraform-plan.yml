name: Terraform Plan

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
      mode:
        description: "Plan type"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy

env:
  TF_VERSION: 1.6.6

jobs:
  plan:
    name: "Terraform Plan [${{ github.event.inputs.environment }}] [${{ github.event.inputs.mode }}]"
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      RHCS_TOKEN:            ${{ secrets.TF_VAR_RHCS_TOKEN }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify environment
        run: |
          echo "Environment : ${{ github.event.inputs.environment }}"
          echo "Mode        : ${{ github.event.inputs.mode }}"
          echo "Var file    : ${{ github.event.inputs.environment }}.tfvars"
          echo "AWS_ACCESS_KEY_ID set? ${AWS_ACCESS_KEY_ID:+YES}"
          echo "RHCS_TOKEN set?        ${RHCS_TOKEN:+YES}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init
        run: terraform init -input=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          VAR_FILE="${{ github.event.inputs.environment }}.tfvars"
          MODE="${{ github.event.inputs.mode }}"
          if [ "$MODE" = "destroy" ]; then
            terraform plan -destroy -var-file="$VAR_FILE" -out=tfplan -input=false
          elif [ "$MODE" = "apply" ]; then
            terraform plan -var-file="$VAR_FILE" -out=tfplan -input=false
          else
            # plan mode: dry-run only, no artifact saved
            terraform plan -var-file="$VAR_FILE" -input=false
          fi

      - name: Upload Plan Artifact for Review
        if: ${{ github.event.inputs.mode != 'plan' }}
        uses: actions/upload-artifact@v4
        with:
          name: "tfplan-${{ github.event.inputs.environment }}-${{ github.event.inputs.mode }}"
          path: tfplan
