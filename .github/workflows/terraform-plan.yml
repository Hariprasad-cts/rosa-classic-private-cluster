name: Terraform Plan

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
      mode:
        description: "Plan type"
        required: true
        type: choice
        options:
          - apply
          - destroy

env:
  # Override via GitHub repo variable: Settings → Variables → TF_VERSION
  TF_VERSION: ${{ vars.TF_VERSION || '1.6.6' }}

jobs:
  plan:
    name: "Terraform Plan [${{ github.event.inputs.environment }}] [${{ github.event.inputs.mode }}]"
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      RHCS_TOKEN:            ${{ secrets.TF_VAR_RHCS_TOKEN }}
      # Override via GitHub repo variables: Settings → Variables
      TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE || 'rosa-terraform-lock' }}
      TF_STATE_KEY:  "rosa/${{ github.event.inputs.environment }}/terraform.tfstate"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify environment
        run: |
          echo "Environment : ${{ github.event.inputs.environment }}"
          echo "Mode        : ${{ github.event.inputs.mode }}"
          echo "Var file    : ${{ github.event.inputs.environment }}.tfvars"
          echo "AWS_ACCESS_KEY_ID set? ${AWS_ACCESS_KEY_ID:+YES}"
          echo "RHCS_TOKEN set?        ${RHCS_TOKEN:+YES}"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # Derive the S3 bucket name (uses AWS account ID) and region (from tfvars).
      # These are written to GITHUB_ENV so all subsequent steps can use them.
      - name: Resolve backend config
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          VAR_FILE="${{ github.event.inputs.environment }}.tfvars"
          REGION=$(grep -E '^aws_region\s*=' "$VAR_FILE" | sed -E 's/.*=\s*"([^"]+)".*/\1/')
          REGION="${REGION:-${{ vars.AWS_DEFAULT_REGION || 'us-west-1' }}}"
          BUCKET="rosa-terraform-state-${ACCOUNT_ID}"
          echo "STATE_BUCKET=$BUCKET"   >> "$GITHUB_ENV"
          echo "STATE_REGION=$REGION"   >> "$GITHUB_ENV"
          echo "Bucket : $BUCKET"
          echo "Region : $REGION"

      # Idempotent — skipped if bucket already exists.
      # us-east-1 cannot use LocationConstraint (AWS restriction).
      - name: Bootstrap S3 state bucket
        run: |
          if aws s3api head-bucket --bucket "$STATE_BUCKET" 2>/dev/null; then
            echo "Bucket already exists: $STATE_BUCKET"
          else
            echo "Creating bucket: $STATE_BUCKET in $STATE_REGION"
            if [ "$STATE_REGION" = "us-east-1" ]; then
              aws s3api create-bucket \
                --bucket "$STATE_BUCKET" \
                --region "$STATE_REGION"
            else
              aws s3api create-bucket \
                --bucket "$STATE_BUCKET" \
                --region "$STATE_REGION" \
                --create-bucket-configuration LocationConstraint="$STATE_REGION"
            fi
            aws s3api put-bucket-versioning \
              --bucket "$STATE_BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "$STATE_BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block \
              --bucket "$STATE_BUCKET" \
              --public-access-block-configuration \
              'BlockPublicAcls=true,BlockPublicPolicy=true,IgnorePublicAcls=true,RestrictPublicBuckets=true'
            echo "Bucket created and configured."
          fi

      # Idempotent — skipped if table already exists.
      - name: Bootstrap DynamoDB lock table
        run: |
          if aws dynamodb describe-table \
               --table-name "$TF_LOCK_TABLE" \
               --region "$STATE_REGION" 2>/dev/null; then
            echo "DynamoDB table already exists."
          else
            echo "Creating DynamoDB table: $TF_LOCK_TABLE"
            aws dynamodb create-table \
              --table-name  "$TF_LOCK_TABLE" \
              --region      "$STATE_REGION" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema           AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST
            aws dynamodb wait table-exists \
              --table-name "$TF_LOCK_TABLE" \
              --region     "$STATE_REGION"
            echo "DynamoDB table created."
          fi

      # Partial backend config — bucket/region/key/table supplied via flags.
      - name: Terraform Init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${STATE_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      # On the very first run the S3 bucket and DynamoDB table exist in AWS
      # (created above) but are not yet tracked in Terraform state.
      # Import them so the subsequent plan shows no unexpected recreations.
      - name: Import backend resources into state
        run: |
          VAR_FILE="${{ github.event.inputs.environment }}.tfvars"

          import_if_missing() {
            local addr="$1" id="$2"
            local existing
            existing=$(terraform state list 2>/dev/null || true)
            if echo "$existing" | grep -qxF "$addr"; then
              echo "Already in state: $addr"
            else
              echo "Importing: $addr (id=$id)"
              terraform import -input=false -var-file="$VAR_FILE" "$addr" "$id" || true
            fi
          }

          import_if_missing "aws_s3_bucket.terraform_state"                                      "$STATE_BUCKET"
          import_if_missing "aws_s3_bucket_versioning.terraform_state"                           "$STATE_BUCKET"
          import_if_missing "aws_s3_bucket_server_side_encryption_configuration.terraform_state" "$STATE_BUCKET"
          import_if_missing "aws_s3_bucket_public_access_block.terraform_state"                  "$STATE_BUCKET"
          import_if_missing "aws_dynamodb_table.terraform_lock"                                  "$TF_LOCK_TABLE"

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: |
          VAR_FILE="${{ github.event.inputs.environment }}.tfvars"
          MODE="${{ github.event.inputs.mode }}"
          if [ "$MODE" = "destroy" ]; then
            terraform plan -destroy -var-file="$VAR_FILE" -out=tfplan -input=false
          elif [ "$MODE" = "apply" ]; then
            terraform plan -var-file="$VAR_FILE" -out=tfplan -input=false
          else
            # plan mode: dry-run only, no artifact saved
            terraform plan -var-file="$VAR_FILE" -input=false
          fi

      - name: Upload Plan Artifact for Review
        if: ${{ github.event.inputs.mode != 'plan' }}
        uses: actions/upload-artifact@v4
        with:
          name: "tfplan-${{ github.event.inputs.environment }}-${{ github.event.inputs.mode }}"
          path: tfplan
