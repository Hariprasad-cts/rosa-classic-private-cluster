name: Terraform Apply

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod

env:
  TF_VERSION: ${{ vars.TF_VERSION || '1.6.6' }}

jobs:
  apply:
    name: "Terraform Apply [${{ github.event.inputs.environment }}]"
    runs-on: ubuntu-latest
    environment: production

    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      RHCS_TOKEN:            ${{ secrets.TF_VAR_RHCS_TOKEN }}
      TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE || 'rosa-terraform-lock' }}
      TF_STATE_KEY:  "rosa/${{ github.event.inputs.environment }}/terraform.tfstate"

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Resolve backend config
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          VAR_FILE="${{ github.event.inputs.environment }}.tfvars"
          REGION=$(grep -E '^aws_region\s*=' "$VAR_FILE" | sed -E 's/.*=\s*"([^"]+)".*/\1/')
          REGION="${REGION:-${{ vars.AWS_DEFAULT_REGION || 'us-west-1' }}}"
          BUCKET="rosa-terraform-state-${ACCOUNT_ID}"
          echo "STATE_BUCKET=$BUCKET"   >> "$GITHUB_ENV"
          echo "STATE_REGION=$REGION"   >> "$GITHUB_ENV"
          echo "Bucket : $BUCKET"
          echo "Region : $REGION"

      # Safety net — bucket will already exist if plan ran first, but ensures
      # apply never fails due to a missing backend on a fresh runner.
      - name: Bootstrap S3 state bucket
        run: |
          if aws s3api head-bucket --bucket "$STATE_BUCKET" 2>/dev/null; then
            echo "Bucket already exists: $STATE_BUCKET"
          else
            echo "Creating bucket: $STATE_BUCKET in $STATE_REGION"
            if [ "$STATE_REGION" = "us-east-1" ]; then
              aws s3api create-bucket \
                --bucket "$STATE_BUCKET" \
                --region "$STATE_REGION"
            else
              aws s3api create-bucket \
                --bucket "$STATE_BUCKET" \
                --region "$STATE_REGION" \
                --create-bucket-configuration LocationConstraint="$STATE_REGION"
            fi
            aws s3api put-bucket-versioning \
              --bucket "$STATE_BUCKET" \
              --versioning-configuration Status=Enabled
            aws s3api put-bucket-encryption \
              --bucket "$STATE_BUCKET" \
              --server-side-encryption-configuration \
              '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'
            aws s3api put-public-access-block \
              --bucket "$STATE_BUCKET" \
              --public-access-block-configuration \
              'BlockPublicAcls=true,BlockPublicPolicy=true,IgnorePublicAcls=true,RestrictPublicBuckets=true'
            echo "Bucket created and configured."
          fi

      - name: Bootstrap DynamoDB lock table
        run: |
          if aws dynamodb describe-table \
               --table-name "$TF_LOCK_TABLE" \
               --region "$STATE_REGION" 2>/dev/null; then
            echo "DynamoDB table already exists."
          else
            echo "Creating DynamoDB table: $TF_LOCK_TABLE"
            aws dynamodb create-table \
              --table-name  "$TF_LOCK_TABLE" \
              --region      "$STATE_REGION" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema           AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST
            aws dynamodb wait table-exists \
              --table-name "$TF_LOCK_TABLE" \
              --region     "$STATE_REGION"
            echo "DynamoDB table created."
          fi

      - name: Terraform Init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${STATE_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      - name: Download Approved Plan
        uses: actions/download-artifact@v4
        with:
          name: "tfplan-${{ github.event.inputs.environment }}-apply"

      - name: Terraform Apply
        run: terraform apply -input=false tfplan
