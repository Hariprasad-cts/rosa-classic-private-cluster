name: Terraform Destroy
 
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
      plan_run_id:
        description: "Run ID of the Terraform Plan workflow (copy from Actions tab URL)"
        required: true
        type: string
      confirm_destroy:
        description: "Type DESTROY to confirm — prevents accidental deletion"
        required: true
        type: string
 
env:
  TF_VERSION: ${{ vars.TF_VERSION || '1.6.6' }}
 
jobs:
  destroy:
    name: "Terraform Destroy [${{ github.event.inputs.environment }}]"
    runs-on: ubuntu-latest
    environment: production
 
    permissions:
      id-token: write
      contents: read
      actions: read        # required to download artifacts across workflow runs
 
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      RHCS_TOKEN:            ${{ secrets.TF_VAR_RHCS_TOKEN }}
      TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE || 'rosa-terraform-lock' }}
      TF_STATE_KEY:  "rosa/${{ github.event.inputs.environment }}/terraform.tfstate"
 
    steps:
      # ── Safety check — must type DESTROY to proceed ────────────
      - name: Destroy Safety Check
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "ERROR: You must type DESTROY in the confirm_destroy field."
            echo "Aborting to prevent accidental infrastructure deletion."
            exit 1
          fi
          echo "Destroy confirmed by ${{ github.actor }} for environment: ${{ github.event.inputs.environment }}"
 
      - uses: actions/checkout@v4
 
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
 
      # Resolve bucket name and region — same logic as Plan
      # No bootstrap here — S3 and DynamoDB already created by Plan workflow
      - name: Resolve backend config
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          VAR_FILE="${{ github.event.inputs.environment }}.tfvars"
          REGION=$(grep -E '^aws_region\s*=' "$VAR_FILE" | sed -E 's/.*=\s*"([^"]+)".*/\1/')
          REGION="${REGION:-${{ vars.AWS_DEFAULT_REGION || 'us-west-1' }}}"
          BUCKET="rosa-terraform-state-${ACCOUNT_ID}"
          echo "STATE_BUCKET=$BUCKET"   >> "$GITHUB_ENV"
          echo "STATE_REGION=$REGION"   >> "$GITHUB_ENV"
          echo "Bucket : $BUCKET"
          echo "Region : $REGION"
 
      # Init only — no bootstrap steps to avoid touching state before destroy
      - name: Terraform Init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${STATE_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"
 
      # Download the exact destroy plan artifact from the Plan workflow run
      - name: Download Approved Destroy Plan
        uses: actions/download-artifact@v4
        with:
          name: "tfplan-${{ github.event.inputs.environment }}"
          repository: ${{ github.repository }}
          run-id: ${{ github.event.inputs.plan_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
 
      # Apply the destroy plan — no re-plan, uses exact plan from artifact
      - name: Terraform Destroy
        run: terraform apply -input=false tfplan
