name: Terraform Destroy
 
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
      confirm_destroy:
        description: "Type DESTROY to confirm — prevents accidental deletion"
        required: true
        type: string
 
env:
  TF_VERSION: ${{ vars.TF_VERSION || '1.6.6' }}
 
jobs:
  destroy:
    name: "Terraform Destroy [${{ github.event.inputs.environment }}]"
    runs-on: ubuntu-latest
    environment: production
 
    permissions:
      id-token: write
      contents: read
 
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      RHCS_TOKEN:            ${{ secrets.TF_VAR_RHCS_TOKEN }}
      TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE || 'rosa-terraform-lock' }}
      TF_STATE_KEY:  "rosa/${{ github.event.inputs.environment }}/terraform.tfstate"
 
    steps:
      # ── Safety check ───────────────────────────────────────────
      - name: Destroy Safety Check
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "ERROR: You must type DESTROY in the confirm_destroy field."
            exit 1
          fi
          echo "Destroy confirmed by ${{ github.actor }}"
          echo "Environment : ${{ github.event.inputs.environment }}"
 
      - uses: actions/checkout@v4
 
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
 
      - name: Resolve backend config
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          VAR_FILE="${{ github.event.inputs.environment }}.tfvars"
          REGION=$(grep -E '^aws_region\s*=' "$VAR_FILE" | sed -E 's/.*=\s*"([^"]+)".*/\1/')
          REGION="${REGION:-${{ vars.AWS_DEFAULT_REGION || 'us-west-1' }}}"
          BUCKET="rosa-terraform-state-${ACCOUNT_ID}"
          echo "STATE_BUCKET=$BUCKET"   >> "$GITHUB_ENV"
          echo "STATE_REGION=$REGION"   >> "$GITHUB_ENV"
          echo "Bucket : $BUCKET"
          echo "Region : $REGION"
 
      # ── FIX 1: Remove prevent_destroy from backend.tf ──────────
      - name: Remove prevent_destroy from backend.tf
        run: |
          echo "Patching backend.tf to remove prevent_destroy..."
          sed -i '/prevent_destroy/d' backend.tf
          echo "prevent_destroy removed successfully"
 
      # ── FIX 2: Clear stale DynamoDB checksum ───────────────────
      # The previous run deleted the tfstate file from S3 but DynamoDB
      # still holds the old checksum — causing a mismatch error.
      # We clear the Digest attribute from DynamoDB so Terraform can load state.
      - name: Clear stale DynamoDB state checksum
        run: |
          LOCK_KEY="$TF_STATE_KEY-md5"
          echo "Checking DynamoDB for stale checksum: $LOCK_KEY"
 
          ITEM=$(aws dynamodb get-item \
            --table-name "$TF_LOCK_TABLE" \
            --region "$STATE_REGION" \
            --key "{\"LockID\": {\"S\": \"$LOCK_KEY\"}}" \
            --output json 2>/dev/null || echo "")
 
          if echo "$ITEM" | grep -q "Digest"; then
            echo "Stale checksum found — removing Digest from DynamoDB..."
            aws dynamodb update-item \
              --table-name "$TF_LOCK_TABLE" \
              --region "$STATE_REGION" \
              --key "{\"LockID\": {\"S\": \"$LOCK_KEY\"}}" \
              --update-expression "REMOVE #d" \
              --expression-attribute-names "{\"#d\": \"Digest\"}"
            echo "DynamoDB checksum cleared successfully."
          else
            echo "No stale checksum found — skipping."
          fi
 
      # ── FIX 3: Restore tfstate if it was accidentally deleted ──
      # Previous run may have deleted tfstate from S3.
      # Check if it exists — if not, we cannot destroy via Terraform.
      - name: Verify tfstate exists in S3
        run: |
          echo "Checking if tfstate exists: s3://$STATE_BUCKET/$TF_STATE_KEY"
          if aws s3 ls "s3://$STATE_BUCKET/$TF_STATE_KEY" 2>/dev/null; then
            echo "tfstate found — proceeding with destroy."
          else
            echo "ERROR: tfstate not found in S3!"
            echo "The state file was deleted by the previous run."
            echo "You will need to manually delete AWS resources or restore the tfstate."
            exit 1
          fi
 
      - name: Terraform Init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${STATE_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"
 
      # Show what will be destroyed
      - name: Terraform Plan Destroy
        run: |
          terraform plan -destroy \
            -var-file="${{ github.event.inputs.environment }}.tfvars" \
            -input=false \
            -no-color
 
      # Direct destroy — no saved plan — avoids stale plan error
      - name: Terraform Destroy
        run: |
          terraform destroy \
            -var-file="${{ github.event.inputs.environment }}.tfvars" \
            -auto-approve \
            -input=false
 
      # ── AFTER DESTROY: Clean up S3 bucket versions ─────────────
      # Only runs AFTER terraform destroy completes successfully.
      # At this point tfstate is no longer needed so safe to empty + delete.
      - name: Cleanup S3 state bucket after destroy
        if: success()
        run: |
          echo "Emptying S3 bucket after successful destroy: $STATE_BUCKET"
 
          # Delete all object versions
          VERSIONS=$(aws s3api list-object-versions \
            --bucket "$STATE_BUCKET" \
            --region "$STATE_REGION" \
            --query 'Versions[].{Key:Key,VersionId:VersionId}' \
            --output json 2>/dev/null)
 
          if [ "$VERSIONS" != "null" ] && [ -n "$VERSIONS" ]; then
            echo "$VERSIONS" | jq -c '.[]' | while read obj; do
              KEY=$(echo "$obj" | jq -r '.Key')
              VID=$(echo "$obj" | jq -r '.VersionId')
              aws s3api delete-object \
                --bucket "$STATE_BUCKET" \
                --key "$KEY" \
                --version-id "$VID" \
                --region "$STATE_REGION"
            done
          fi
 
          # Delete all delete markers
          MARKERS=$(aws s3api list-object-versions \
            --bucket "$STATE_BUCKET" \
            --region "$STATE_REGION" \
            --query 'DeleteMarkers[].{Key:Key,VersionId:VersionId}' \
            --output json 2>/dev/null)
 
          if [ "$MARKERS" != "null" ] && [ -n "$MARKERS" ]; then
            echo "$MARKERS" | jq -c '.[]' | while read obj; do
              KEY=$(echo "$obj" | jq -r '.Key')
              VID=$(echo "$obj" | jq -r '.VersionId')
              aws s3api delete-object \
                --bucket "$STATE_BUCKET" \
                --key "$KEY" \
                --version-id "$VID" \
                --region "$STATE_REGION"
            done
          fi
 
          # Delete the bucket itself
          aws s3api delete-bucket \
            --bucket "$STATE_BUCKET" \
            --region "$STATE_REGION" && \
            echo "S3 bucket deleted: $STATE_BUCKET" || \
            echo "Bucket delete skipped — may still have objects."
