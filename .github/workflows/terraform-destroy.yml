name: Terraform Destroy
 
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
      confirm_destroy:
        description: "Type DESTROY to confirm — prevents accidental deletion"
        required: true
        type: string
 
env:
  TF_VERSION: ${{ vars.TF_VERSION || '1.6.6' }}
 
jobs:
  destroy:
    name: "Terraform Destroy [${{ github.event.inputs.environment }}]"
    runs-on: ubuntu-latest
    environment: production
 
    permissions:
      id-token: write
      contents: read
 
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      RHCS_TOKEN:            ${{ secrets.TF_VAR_RHCS_TOKEN }}
      TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE || 'rosa-terraform-lock' }}
      TF_STATE_KEY:  "rosa/${{ github.event.inputs.environment }}/terraform.tfstate"
 
    steps:
      # ── Safety check ───────────────────────────────────────────
      - name: Destroy Safety Check
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "ERROR: You must type DESTROY in the confirm_destroy field."
            exit 1
          fi
          echo "Destroy confirmed by ${{ github.actor }}"
          echo "Environment : ${{ github.event.inputs.environment }}"
 
      - uses: actions/checkout@v4
 
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
 
      - name: Resolve backend config
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          VAR_FILE="${{ github.event.inputs.environment }}.tfvars"
          REGION=$(grep -E '^aws_region\s*=' "$VAR_FILE" | sed -E 's/.*=\s*"([^"]+)".*/\1/')
          REGION="${REGION:-${{ vars.AWS_DEFAULT_REGION || 'us-west-1' }}}"
          BUCKET="rosa-terraform-state-${ACCOUNT_ID}"
          echo "STATE_BUCKET=$BUCKET"   >> "$GITHUB_ENV"
          echo "STATE_REGION=$REGION"   >> "$GITHUB_ENV"
          echo "Bucket : $BUCKET"
          echo "Region : $REGION"
 
      # Recreate DynamoDB lock table if a previous failed destroy deleted it.
      # Without this, every subsequent terraform command fails to acquire a lock.
      - name: Bootstrap DynamoDB lock table
        run: |
          if aws dynamodb describe-table \
               --table-name "$TF_LOCK_TABLE" \
               --region "$STATE_REGION" 2>/dev/null; then
            echo "DynamoDB table already exists."
          else
            echo "DynamoDB table missing — recreating: $TF_LOCK_TABLE"
            aws dynamodb create-table \
              --table-name  "$TF_LOCK_TABLE" \
              --region      "$STATE_REGION" \
              --attribute-definitions AttributeName=LockID,AttributeType=S \
              --key-schema           AttributeName=LockID,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST
            aws dynamodb wait table-exists \
              --table-name "$TF_LOCK_TABLE" \
              --region     "$STATE_REGION"
            echo "DynamoDB table recreated."
          fi

      # ── FIX 1: Remove prevent_destroy ──────────────────────────
      - name: Remove prevent_destroy from backend.tf
        run: |
          sed -i '/prevent_destroy/d' backend.tf
          echo "prevent_destroy removed successfully"
 
      # ── FIX 2: Restore tfstate from S3 versioning ──────────────
      # Previous run deleted the tfstate file from S3.
      # Since versioning is enabled, we can restore the latest real version
      # by deleting the delete marker — this brings the file back.
      - name: Restore tfstate from S3 versioning if deleted
        run: |
          echo "Checking if tfstate exists: s3://$STATE_BUCKET/$TF_STATE_KEY"
 
          if aws s3 ls "s3://$STATE_BUCKET/$TF_STATE_KEY" --region "$STATE_REGION" 2>/dev/null; then
            echo "tfstate exists — no restore needed."
          else
            echo "tfstate not found — attempting restore from S3 versioning..."
 
            # Find the delete marker for the tfstate file
            DELETE_MARKER_ID=$(aws s3api list-object-versions \
              --bucket "$STATE_BUCKET" \
              --region "$STATE_REGION" \
              --prefix "$TF_STATE_KEY" \
              --query "DeleteMarkers[?Key=='$TF_STATE_KEY'] | sort_by(@, &LastModified) | [-1].VersionId" \
              --output text 2>/dev/null)
 
            if [ -n "$DELETE_MARKER_ID" ] && [ "$DELETE_MARKER_ID" != "None" ] && [ "$DELETE_MARKER_ID" != "null" ]; then
              echo "Found delete marker: $DELETE_MARKER_ID — removing it to restore tfstate..."
              aws s3api delete-object \
                --bucket "$STATE_BUCKET" \
                --key "$TF_STATE_KEY" \
                --version-id "$DELETE_MARKER_ID" \
                --region "$STATE_REGION"
              echo "Delete marker removed — tfstate restored successfully."
            else
              echo "No delete marker found — tfstate is permanently gone."
              echo "Attempting to find latest version and restore manually..."
 
              # Get latest version ID
              LATEST_VERSION=$(aws s3api list-object-versions \
                --bucket "$STATE_BUCKET" \
                --region "$STATE_REGION" \
                --prefix "$TF_STATE_KEY" \
                --query "Versions[?Key=='$TF_STATE_KEY'] | sort_by(@, &LastModified) | [-1].VersionId" \
                --output text 2>/dev/null)
 
              if [ -n "$LATEST_VERSION" ] && [ "$LATEST_VERSION" != "None" ] && [ "$LATEST_VERSION" != "null" ]; then
                echo "Restoring from version: $LATEST_VERSION"
                aws s3api copy-object \
                  --bucket "$STATE_BUCKET" \
                  --copy-source "$STATE_BUCKET/$TF_STATE_KEY?versionId=$LATEST_VERSION" \
                  --key "$TF_STATE_KEY" \
                  --region "$STATE_REGION"
                echo "tfstate restored from version: $LATEST_VERSION"
              else
                echo "ERROR: No versions found. tfstate is permanently deleted."
                echo "Resources must be deleted manually from AWS Console."
                exit 1
              fi
            fi
          fi
 
      # ── FIX 3: Clear stale DynamoDB checksum ───────────────────
      - name: Clear stale DynamoDB state checksum
        run: |
          LOCK_KEY="$TF_STATE_KEY-md5"
          echo "Checking DynamoDB for stale checksum: $LOCK_KEY"

          ITEM=$(aws dynamodb get-item \
            --table-name "$TF_LOCK_TABLE" \
            --region "$STATE_REGION" \
            --key "{\"LockID\": {\"S\": \"$LOCK_KEY\"}}" \
            --output json 2>/dev/null || echo "")

          if echo "$ITEM" | grep -q "Digest"; then
            echo "Stale checksum found — removing..."
            aws dynamodb update-item \
              --table-name "$TF_LOCK_TABLE" \
              --region "$STATE_REGION" \
              --key "{\"LockID\": {\"S\": \"$LOCK_KEY\"}}" \
              --update-expression "REMOVE #d" \
              --expression-attribute-names "{\"#d\": \"Digest\"}"
            echo "DynamoDB checksum cleared."
          else
            echo "No stale checksum — skipping."
          fi

      # ── FIX 4: Force unlock stale state lock ───────────────────
      # A previous Apply/Plan run may have crashed and left an active lock
      # in DynamoDB. Deleting the lock item directly is equivalent to
      # terraform force-unlock and is safe when no real operation is running.
      - name: Force unlock stale state lock
        run: |
          LOCK_KEY="${STATE_BUCKET}/${TF_STATE_KEY}"
          echo "Checking DynamoDB for stale state lock: $LOCK_KEY"

          ITEM=$(aws dynamodb get-item \
            --table-name "$TF_LOCK_TABLE" \
            --region "$STATE_REGION" \
            --key "{\"LockID\": {\"S\": \"$LOCK_KEY\"}}" \
            --output json 2>/dev/null || echo "")

          if [ -n "$ITEM" ] && [ "$ITEM" != "{}" ]; then
            echo "Stale lock found — force unlocking..."
            aws dynamodb delete-item \
              --table-name "$TF_LOCK_TABLE" \
              --region "$STATE_REGION" \
              --key "{\"LockID\": {\"S\": \"$LOCK_KEY\"}}"
            echo "State lock cleared."
          else
            echo "No stale lock — skipping."
          fi
 
      # ── FIX 5: Pre-destroy VPC dependency cleanup ──────────────
      # Terraform cannot delete a subnet while AWS resources (NAT GW, VPC
      # endpoints, IGW) still have ENIs inside it. This step removes those
      # dependents first using the VPC ID derived from the tfvars cluster name.
      # All AWS CLI calls are idempotent — safe to run even if already gone.
      - name: Pre-destroy VPC dependency cleanup
        run: |
          VAR_FILE="${{ github.event.inputs.environment }}.tfvars"
          CLUSTER=$(grep -E '^cluster_name\s*=' "$VAR_FILE" | sed -E 's/.*=\s*"([^"]+)".*/\1/')

          echo "Looking up VPC for cluster: $CLUSTER"
          VPC_ID=$(aws ec2 describe-vpcs \
            --region "$STATE_REGION" \
            --filters "Name=tag:Name,Values=${CLUSTER}-vpc" \
            --query "Vpcs[0].VpcId" \
            --output text 2>/dev/null)

          if [ -z "$VPC_ID" ] || [ "$VPC_ID" = "None" ]; then
            echo "VPC not found — skipping pre-destroy cleanup."
            exit 0
          fi
          echo "Found VPC: $VPC_ID"

          # 1. Delete NAT Gateways
          NAT_IDS=$(aws ec2 describe-nat-gateways \
            --region "$STATE_REGION" \
            --filter "Name=vpc-id,Values=$VPC_ID" "Name=state,Values=available,pending" \
            --query "NatGateways[].NatGatewayId" \
            --output text 2>/dev/null)
          for NAT in $NAT_IDS; do
            echo "Deleting NAT Gateway: $NAT"
            aws ec2 delete-nat-gateway --region "$STATE_REGION" --nat-gateway-id "$NAT"
          done
          if [ -n "$NAT_IDS" ]; then
            echo "Waiting for NAT Gateways to finish deleting..."
            aws ec2 wait nat-gateway-deleted \
              --region "$STATE_REGION" \
              --filter "Name=vpc-id,Values=$VPC_ID" "Name=state,Values=deleting" 2>/dev/null || true
          fi

          # 2. Delete VPC Endpoints
          ENDPOINT_IDS=$(aws ec2 describe-vpc-endpoints \
            --region "$STATE_REGION" \
            --filters "Name=vpc-id,Values=$VPC_ID" "Name=vpc-endpoint-state,Values=available,pending" \
            --query "VpcEndpoints[].VpcEndpointId" \
            --output text 2>/dev/null)
          if [ -n "$ENDPOINT_IDS" ]; then
            echo "Deleting VPC Endpoints: $ENDPOINT_IDS"
            aws ec2 delete-vpc-endpoints \
              --region "$STATE_REGION" \
              --vpc-endpoint-ids $ENDPOINT_IDS
          fi

          # 3. Detach and delete Internet Gateway
          IGW_ID=$(aws ec2 describe-internet-gateways \
            --region "$STATE_REGION" \
            --filters "Name=attachment.vpc-id,Values=$VPC_ID" \
            --query "InternetGateways[0].InternetGatewayId" \
            --output text 2>/dev/null)
          if [ -n "$IGW_ID" ] && [ "$IGW_ID" != "None" ]; then
            echo "Detaching and deleting IGW: $IGW_ID"
            aws ec2 detach-internet-gateway \
              --region "$STATE_REGION" \
              --internet-gateway-id "$IGW_ID" \
              --vpc-id "$VPC_ID"
            aws ec2 delete-internet-gateway \
              --region "$STATE_REGION" \
              --internet-gateway-id "$IGW_ID"
          fi

          # 4. Release EIPs tagged to this cluster
          EIP_ALLOC_IDS=$(aws ec2 describe-addresses \
            --region "$STATE_REGION" \
            --filters "Name=tag:Name,Values=${CLUSTER}-nat-eip" \
            --query "Addresses[].AllocationId" \
            --output text 2>/dev/null)
          for EIP in $EIP_ALLOC_IDS; do
            echo "Releasing EIP: $EIP"
            aws ec2 release-address --region "$STATE_REGION" --allocation-id "$EIP" || true
          done

          echo "Pre-destroy VPC cleanup complete."

      - name: Terraform Init
        run: |
          terraform init -reconfigure -input=false \
            -backend-config="bucket=${STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${STATE_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"

      # Fail fast if state is empty — means backend config is wrong or state was lost
      - name: Verify Terraform State
        run: |
          echo "Verifying state is loaded from s3://$STATE_BUCKET/$TF_STATE_KEY"
          RESOURCE_COUNT=$(terraform state list 2>/dev/null | wc -l | tr -d ' ')
          if [ "$RESOURCE_COUNT" -eq 0 ]; then
            echo "ERROR: Terraform state is empty — no resources found."
            echo "Check that the state key and bucket are correct, and that the apply workflow ran successfully."
            exit 1
          fi
          echo "State loaded — $RESOURCE_COUNT resources tracked:"
          terraform state list

      # ── FIX 6: Remove backend resources from state before destroy ─
      # S3 bucket and DynamoDB table are managed in backend.tf.
      # If left in state, terraform destroy tries to delete them mid-run:
      #   - S3 delete fails  → bucket still has versioned tfstate objects
      #   - DynamoDB deleted → Terraform can't release its own lock afterward
      # Removing them from state keeps them alive throughout destroy so the
      # lock and state writes work. AWS CLI cleans them up after destroy.
      - name: Remove backend resources from Terraform state
        run: |
          for ADDR in \
            aws_s3_bucket.terraform_state \
            aws_s3_bucket_versioning.terraform_state \
            aws_s3_bucket_server_side_encryption_configuration.terraform_state \
            aws_s3_bucket_public_access_block.terraform_state \
            aws_dynamodb_table.terraform_lock; do
            if terraform state list 2>/dev/null | grep -qxF "$ADDR"; then
              echo "Removing from state: $ADDR"
              terraform state rm -lock=false "$ADDR"
            else
              echo "Not in state (skipping): $ADDR"
            fi
          done

      - name: Terraform Plan Destroy
        run: |
          terraform plan -destroy \
            -var-file="${{ github.event.inputs.environment }}.tfvars" \
            -input=false \
            -no-color

      - name: Terraform Destroy
        run: |
          terraform destroy \
            -var-file="${{ github.event.inputs.environment }}.tfvars" \
            -auto-approve \
            -input=false

      # After destroy, Terraform automatically writes an empty state back to S3.
      # The S3 bucket and DynamoDB table are shared across dev/uat/prod and
      # must NOT be deleted here. They persist for other environments.
