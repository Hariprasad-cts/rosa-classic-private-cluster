name: Terraform Destroy
 
on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - dev
          - uat
          - prod
      confirm_destroy:
        description: "Type DESTROY to confirm — prevents accidental deletion"
        required: true
        type: string
 
env:
  TF_VERSION: ${{ vars.TF_VERSION || '1.6.6' }}
 
jobs:
  destroy:
    name: "Terraform Destroy [${{ github.event.inputs.environment }}]"
    runs-on: ubuntu-latest
    environment: production
 
    permissions:
      id-token: write
      contents: read
 
    env:
      AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      RHCS_TOKEN:            ${{ secrets.TF_VAR_RHCS_TOKEN }}
      TF_LOCK_TABLE: ${{ vars.TF_LOCK_TABLE || 'rosa-terraform-lock' }}
      TF_STATE_KEY:  "rosa/${{ github.event.inputs.environment }}/terraform.tfstate"
 
    steps:
      # ── Safety check — must type DESTROY to proceed ────────────
      - name: Destroy Safety Check
        run: |
          if [ "${{ github.event.inputs.confirm_destroy }}" != "DESTROY" ]; then
            echo "ERROR: You must type DESTROY in the confirm_destroy field."
            echo "Aborting to prevent accidental infrastructure deletion."
            exit 1
          fi
          echo "Destroy confirmed by ${{ github.actor }}"
          echo "Environment : ${{ github.event.inputs.environment }}"
 
      - uses: actions/checkout@v4
 
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}
 
      - name: Resolve backend config
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          VAR_FILE="${{ github.event.inputs.environment }}.tfvars"
          REGION=$(grep -E '^aws_region\s*=' "$VAR_FILE" | sed -E 's/.*=\s*"([^"]+)".*/\1/')
          REGION="${REGION:-${{ vars.AWS_DEFAULT_REGION || 'us-west-1' }}}"
          BUCKET="rosa-terraform-state-${ACCOUNT_ID}"
          echo "STATE_BUCKET=$BUCKET"   >> "$GITHUB_ENV"
          echo "STATE_REGION=$REGION"   >> "$GITHUB_ENV"
          echo "Bucket : $BUCKET"
          echo "Region : $REGION"
 
      - name: Terraform Init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${STATE_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY}" \
            -backend-config="region=${STATE_REGION}" \
            -backend-config="dynamodb_table=${TF_LOCK_TABLE}" \
            -backend-config="encrypt=true"
 
      # ── KEY FIX ─────────────────────────────────────────────────
      # backend.tf has lifecycle.prevent_destroy = true on the S3 bucket
      # This blocks terraform destroy entirely.
      # We patch backend.tf in-place to remove prevent_destroy before destroying.
      - name: Remove prevent_destroy from backend.tf
        run: |
          echo "Patching backend.tf to remove prevent_destroy..."
          sed -i '/prevent_destroy/d' backend.tf
          echo "Patched backend.tf:"
          grep -n "lifecycle\|prevent_destroy" backend.tf || echo "prevent_destroy removed successfully"
 
      # Also remove S3 bucket object versions so bucket can be deleted
      - name: Empty S3 state bucket before destroy
        run: |
          echo "Emptying versioned S3 bucket: $STATE_BUCKET"
 
          # Delete all object versions
          aws s3api list-object-versions \
            --bucket "$STATE_BUCKET" \
            --region "$STATE_REGION" \
            --query 'Versions[].{Key:Key,VersionId:VersionId}' \
            --output json 2>/dev/null | \
          jq -c '.[]' 2>/dev/null | while read obj; do
            KEY=$(echo "$obj" | jq -r '.Key')
            VID=$(echo "$obj" | jq -r '.VersionId')
            aws s3api delete-object \
              --bucket "$STATE_BUCKET" \
              --key "$KEY" \
              --version-id "$VID" \
              --region "$STATE_REGION"
          done
 
          # Delete all delete markers
          aws s3api list-object-versions \
            --bucket "$STATE_BUCKET" \
            --region "$STATE_REGION" \
            --query 'DeleteMarkers[].{Key:Key,VersionId:VersionId}' \
            --output json 2>/dev/null | \
          jq -c '.[]' 2>/dev/null | while read obj; do
            KEY=$(echo "$obj" | jq -r '.Key')
            VID=$(echo "$obj" | jq -r '.VersionId')
            aws s3api delete-object \
              --bucket "$STATE_BUCKET" \
              --key "$KEY" \
              --version-id "$VID" \
              --region "$STATE_REGION"
          done
 
          echo "S3 bucket emptied successfully."
 
      # Show what will be destroyed
      - name: Terraform Plan Destroy
        run: |
          terraform plan -destroy \
            -var-file="${{ github.event.inputs.environment }}.tfvars" \
            -input=false \
            -no-color
 
      # Direct destroy — no saved plan — avoids stale plan error
      - name: Terraform Destroy
        run: |
          terraform destroy \
            -var-file="${{ github.event.inputs.environment }}.tfvars" \
            -auto-approve \
            -input=false
